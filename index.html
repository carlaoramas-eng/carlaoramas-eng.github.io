<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orak Games</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
      color: #333;
    }
    header {
      background: #007bff;
      color: #fff;
      text-align: center;
      padding: 40px 20px;
    }
    header img {
      width: 120px;
      margin-bottom: 15px;
    }
    h1 {
      margin: 0;
      font-size: 2.2em;
    }
    main {
      padding: 30px 20px;
      text-align: center;
    }
    .game-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 20px;
      margin: 20px auto;
      max-width: 500px;
    }
    .game-card img {
      width: 200px;
      margin-bottom: 15px;
    }
    .buttons a {
      display: inline-block;
      margin: 10px;
      padding: 12px 25px;
      background: #007bff;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
      transition: background 0.3s;
    }
    .buttons a:hover {
      background: #ffffff;
      color: #007bff;
      border: 2px solid #007bff;
    }
    footer {
      background: #333;
      color: #fff;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }
    .social-icons img {
      width: 35px;
      margin: 0 8px;
      vertical-align: middle;
      transition: transform 0.3s;
    }
    .social-icons img:hover {
      transform: scale(1.2);
    }
  </style>
</head>
<body>
